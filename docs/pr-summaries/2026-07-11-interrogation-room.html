}

}

  &lt;div class=&quot;wrap&quot;&gt;
    &lt;header&gt;
      &lt;div class=&quot;eyebrow&quot;&gt;Interrogation Room · dziennik zmian&lt;/div&gt;
      &lt;h1&gt;Od prototypu do &lt;em&gt;grywalnego fundamentu.&lt;/em&gt;&lt;/h1&gt;
      &lt;p class=&quot;lede&quot;&gt;Jedna intensywna sesja połączyła voice chat, strzelanie, autorytatywną Rundę, prywatne informacje graczy i autorski content — bez wyrzucania eksperymentów, ale z jasnym wyborem tego, co pokazujemy teraz.&lt;/p&gt;
      &lt;div class=&quot;meta&quot;&gt;&lt;span&gt;11 lipca 2026&lt;/span&gt;&lt;span&gt;branch: &lt;code&gt;main&lt;/code&gt;&lt;/span&gt;&lt;span&gt;final: &lt;code&gt;fe6e8db&lt;/code&gt;&lt;/span&gt;&lt;/div&gt;
    &lt;/header&gt;

    &lt;div class=&quot;stats&quot; aria-label=&quot;Podsumowanie liczbowe&quot;&gt;
      &lt;div class=&quot;stat&quot;&gt;&lt;b&gt;108&lt;/b&gt;&lt;small&gt;zmienionych plików&lt;/small&gt;&lt;/div&gt;
      &lt;div class=&quot;stat&quot;&gt;&lt;b&gt;5 264&lt;/b&gt;&lt;small&gt;dodane linie&lt;/small&gt;&lt;/div&gt;
      &lt;div class=&quot;stat&quot;&gt;&lt;b&gt;66/66&lt;/b&gt;&lt;small&gt;testów Edit Mode&lt;/small&gt;&lt;/div&gt;
      &lt;div class=&quot;stat&quot;&gt;&lt;b&gt;0&lt;/b&gt;&lt;small&gt;błędów Console na finiszu&lt;/small&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;section&gt;
      &lt;div class=&quot;section-head&quot;&gt;&lt;h2&gt;Kręgosłup Rundy&lt;/h2&gt;&lt;p&gt;Logika domenowa została oddzielona od Unity i Mirror. Host przechowuje prawdę, a każdy klient dostaje wyłącznie własny, bezpieczny widok Rundy.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;
        &lt;article&gt;&lt;span class=&quot;num&quot;&gt;01 / DOMAIN&lt;/span&gt;&lt;h3&gt;RoundEngine&lt;/h3&gt;&lt;p&gt;Role, Przygotowanie, Limit Rundy, dokładnie jedna Egzekucja oraz indywidualne wyniki Niewinnych.&lt;/p&gt;&lt;/article&gt;
        &lt;article&gt;&lt;span class=&quot;num&quot;&gt;02 / AUTHORITY&lt;/span&gt;&lt;h3&gt;Host owns truth&lt;/h3&gt;&lt;p&gt;Pełne Alibi, ukryte fakty i role pozostają po stronie hosta — nie trafiają do globalnych SyncVarów.&lt;/p&gt;&lt;/article&gt;
        &lt;article&gt;&lt;span class=&quot;num&quot;&gt;03 / DELIVERY&lt;/span&gt;&lt;h3&gt;Private views&lt;/h3&gt;&lt;p&gt;&lt;code&gt;NetworkRoundCoordinator&lt;/code&gt; mapuje połączenia i wysyła celowane &lt;code&gt;PlayerRoundView&lt;/code&gt;.&lt;/p&gt;&lt;/article&gt;
        &lt;article&gt;&lt;span class=&quot;num&quot;&gt;04 / PRESENTATION&lt;/span&gt;&lt;h3&gt;Minimal UI&lt;/h3&gt;&lt;p&gt;Presenter renderuje otrzymany widok i wysyła intencje. Nie podejmuje decyzji za silnik Rundy.&lt;/p&gt;&lt;/article&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section&gt;
      &lt;div class=&quot;section-head&quot;&gt;&lt;h2&gt;Voice, który ma miejsce&lt;/h2&gt;&lt;p&gt;Voice nie jest osobnym kanałem „obok gry”. Jest częścią przestrzeni: odległość, ściany i drzwi decydują, kto kogo słyszy.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;voice&quot;&gt;
        &lt;div&gt;&lt;div class=&quot;quote&quot;&gt;„Słyszysz człowieka, nie kanał.”&lt;/div&gt;&lt;p style=&quot;margin-top:24px&quot;&gt;Spike Kamila dostarczył bazową integrację Vivox, ikonę mikrofonu i konfigurację sceny. Następnie voice został spięty z sesją sieciową, pozycją lokalnego gracza, aktualizacją 3D i tłumieniem przez przeszkody.&lt;/p&gt;&lt;span class=&quot;credit&quot;&gt;Oryginalny voice spike · Kamil Sapota / kamsap12&lt;/span&gt;&lt;/div&gt;
        &lt;div&gt;&lt;div class=&quot;signal&quot; aria-label=&quot;Dekoracyjna fala głosu&quot;&gt;&lt;i style=&quot;--i:1&quot;&gt;&lt;/i&gt;&lt;i style=&quot;--i:2&quot;&gt;&lt;/i&gt;&lt;i style=&quot;--i:3&quot;&gt;&lt;/i&gt;&lt;i style=&quot;--i:4&quot;&gt;&lt;/i&gt;&lt;i style=&quot;--i:5&quot;&gt;&lt;/i&gt;&lt;i style=&quot;--i:6&quot;&gt;&lt;/i&gt;&lt;i style=&quot;--i:7&quot;&gt;&lt;/i&gt;&lt;/div&gt;&lt;p&gt;&lt;strong style=&quot;color:var(--ink)&quot;&gt;Vivox + Mirror&lt;/strong&gt;&lt;br&gt;Wspólna tożsamość sesji, kanał pozycyjny i &lt;code&gt;VivoxVoiceOcclusion&lt;/code&gt;. Sekrety projektu usunięto z repo i dodano do &lt;code&gt;.gitignore&lt;/code&gt;.&lt;/p&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section&gt;
      &lt;div class=&quot;section-head&quot;&gt;&lt;h2&gt;Co dokładnie dowieźliśmy&lt;/h2&gt;&lt;p&gt;Cztery warstwy pracują razem, ale pozostają możliwe do rozwijania i testowania osobno.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;changes&quot;&gt;
        &lt;article class=&quot;change&quot;&gt;&lt;h3&gt;Gameplay playground&lt;/h3&gt;&lt;p&gt;Zachowane mechaniki pozwalają szybko wejść do gry, uruchomić hosta lub klienta, podnieść broń i sprawdzić strzelanie.&lt;/p&gt;&lt;ul&gt;&lt;li&gt;pickup i autorytet broni&lt;/li&gt;&lt;li&gt;strzelanie oraz hitboxy&lt;/li&gt;&lt;li&gt;jawne wymuszenie KCP przez &lt;code&gt;-force-kcp&lt;/code&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
        &lt;article class=&quot;change&quot;&gt;&lt;h3&gt;Autorskie sprawy&lt;/h3&gt;&lt;p&gt;&lt;code&gt;CaseAsset&lt;/code&gt; stał się bezpiecznym wejściem z Unity do niezmiennej domeny, z walidacją danych przed startem.&lt;/p&gt;&lt;ul&gt;&lt;li&gt;Różowy Pomnik Burmistrza&lt;/li&gt;&lt;li&gt;Muzeum, Obserwatorium i Wesele&lt;/li&gt;&lt;li&gt;wybór sprawy i testy konwersji&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
        &lt;article class=&quot;change&quot;&gt;&lt;h3&gt;Sieć i prywatność&lt;/h3&gt;&lt;p&gt;Mirror jest adapterem, a nie miejscem reguł. Każdy gracz otrzymuje tylko informacje, które wolno mu znać.&lt;/p&gt;&lt;ul&gt;&lt;li&gt;celowane wiadomości rundy&lt;/li&gt;&lt;li&gt;mapowanie connection → PlayerId&lt;/li&gt;&lt;li&gt;KCP zweryfikowane przed Steam&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
        &lt;article class=&quot;change&quot;&gt;&lt;h3&gt;Dokumentacja mechanik&lt;/h3&gt;&lt;p&gt;Powstała mapa mechanik opisująca zarówno kod istniejący, jak i celowo odroczone decyzje produktowe.&lt;/p&gt;&lt;ul&gt;&lt;li&gt;16 opisów mechanik&lt;/li&gt;&lt;li&gt;architektura MVP i Steam networking&lt;/li&gt;&lt;li&gt;jawny status eksperymentów po pivocie&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section&gt;
      &lt;div class=&quot;intent&quot;&gt;
        &lt;div class=&quot;big&quot;&gt;Nic nie wyrzucone.&lt;br&gt;&lt;span style=&quot;color:var(--amber)&quot;&gt;Nic nie udaje MVP.&lt;/span&gt;&lt;/div&gt;
        &lt;div&gt;&lt;p style=&quot;color:var(--muted);line-height:1.7;margin-top:0&quot;&gt;Scena &lt;code&gt;Room&lt;/code&gt; jest świadomie technicznym playgroundem. Kod Rundy, UI i Vivox zostaje, ale nie jest domyślnie eksponowany, dopóki nie ustalimy finalnego przepływu i nie skonfigurujemy usług.&lt;/p&gt;&lt;div class=&quot;checks&quot;&gt;&lt;div class=&quot;check&quot;&gt;&lt;span class=&quot;ok&quot;&gt;●&lt;/span&gt;&lt;b&gt;Launcher host / client&lt;/b&gt;&lt;span&gt;aktywny&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;check&quot;&gt;&lt;span class=&quot;ok&quot;&gt;●&lt;/span&gt;&lt;b&gt;Pickup i strzelanie&lt;/b&gt;&lt;span&gt;zachowane&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;check&quot;&gt;&lt;span&gt;○&lt;/span&gt;&lt;b&gt;NetworkRoundCoordinator&lt;/b&gt;&lt;span&gt;wyłączony&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;check&quot;&gt;&lt;span&gt;○&lt;/span&gt;&lt;b&gt;VivoxTest + Canvas&lt;/b&gt;&lt;span&gt;ukryte&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section&gt;
      &lt;div class=&quot;section-head&quot;&gt;&lt;h2&gt;Dowody, nie nadzieja&lt;/h2&gt;&lt;p&gt;Zmiany zostały sprawdzone na poziomie domeny, Unity, sceny i lokalnej sesji sieciowej.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;checks&quot;&gt;&lt;div class=&quot;check&quot;&gt;&lt;span class=&quot;ok&quot;&gt;✓&lt;/span&gt;&lt;b&gt;Edit Mode&lt;/b&gt;&lt;span&gt;66 / 66&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;check&quot;&gt;&lt;span class=&quot;ok&quot;&gt;✓&lt;/span&gt;&lt;b&gt;KCP host + client&lt;/b&gt;&lt;span&gt;połączone&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;check&quot;&gt;&lt;span class=&quot;ok&quot;&gt;✓&lt;/span&gt;&lt;b&gt;Podniesienie broni&lt;/b&gt;&lt;span&gt;HasWeapon = true&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;check&quot;&gt;&lt;span class=&quot;ok&quot;&gt;✓&lt;/span&gt;&lt;b&gt;Walidacja sceny Room&lt;/b&gt;&lt;span&gt;0 problemów&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;check&quot;&gt;&lt;span class=&quot;ok&quot;&gt;✓&lt;/span&gt;&lt;b&gt;Unity Console&lt;/b&gt;&lt;span&gt;0 Errors&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/section&gt;

    &lt;section&gt;
      &lt;div class=&quot;security&quot;&gt;&lt;h3&gt;Klucz Vivox: co zostało zabezpieczone&lt;/h3&gt;&lt;p&gt;Lokalny plik &lt;code&gt;ProjectSettings/Packages/com.unity.services.vivox/Settings.json&lt;/code&gt; nie jest już śledzony i został dodany do &lt;code&gt;.gitignore&lt;/code&gt;. Ponieważ sekret wcześniej pojawił się w historii Git, sam ignore nie unieważnia wycieku: klucz należy przerotować w Unity Dashboard, a nową konfigurację przekazać zespołowi przez menedżer sekretów lub bezpieczny kanał — nigdy przez commit.&lt;/p&gt;&lt;/div&gt;
    &lt;/section&gt;
